<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonsoonAI - Report Hazard</title>
  <link rel="stylesheet" href="../_brand.css" />
  <script src="../js/_api.js"></script>
  <style>
    html, body { height: 100%; background: #fff; }
    .app-shell { max-width: 430px; min-height: 100vh; margin: 0 auto; background: #fff; display: flex; flex-direction: column; }
    @media (min-width: 768px) {
      body { background: var(--warm-bg); display: flex; align-items: center; justify-content: center; }
      .app-shell { min-height: unset; height: 780px; border-radius: 44px; box-shadow: 0 24px 80px rgba(0,0,0,.18); overflow: hidden; }
    }
    .sub-nav { display: flex; align-items: center; gap: 10px; padding: 6px 18px 8px; }
    .back-btn { width: 36px; height: 36px; border-radius: 999px; border: 1px solid var(--hairline); background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .title { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--ink); }
    .report-panel { margin: 10px 16px 0; border: 1px solid var(--hairline); background: #fff; border-radius: 16px; overflow: hidden; }
    .drop-zone { min-height: 220px; background: var(--warm-bg); display: flex; align-items: center; justify-content: center; padding: 18px; position: relative; }
    .preview-img { max-width: 100%; max-height: 260px; border-radius: 12px; display: none; object-fit: contain; }
    .empty-state { text-align: center; color: var(--ink-2); font-size: 13px; line-height: 1.45; }
    .empty-icon { width: 54px; height: 54px; border-radius: 16px; background: var(--orange-tint); color: var(--orange); display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
    .panel-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .note-input { width: 100%; min-height: 82px; resize: none; border: 1px solid var(--hairline); border-radius: 12px; padding: 11px 12px; font: inherit; font-size: 13px; color: var(--ink); outline: none; box-sizing: border-box; }
    .note-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-tint); }
    .result-box { display: none; padding: 12px; border-radius: 12px; background: var(--ok-soft); border: 1px solid var(--ok); color: var(--ink); font-size: 12.5px; line-height: 1.45; }
    .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .hazard-tag { padding: 4px 8px; border-radius: 999px; background: #fff; border: 1px solid var(--hairline); font-size: 11px; font-weight: 800; color: var(--ink); }
    .safe-note { margin: 12px 16px 0; padding: 12px; border-radius: 14px; background: var(--blue-soft); color: var(--ink-2); font-size: 12px; line-height: 1.45; }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="app-header">
    <div class="app-logo">
      <img src="../assets/short_logo.png" alt="" width="32" height="32" style="object-fit:contain;" />
      <span class="app-logo-name">MONSOON<span> AI</span></span>
    </div>
    <div class="flood-pill pill-ok"><span class="dot"></span>REPORT</div>
  </div>

  <div class="sub-nav">
    <button class="back-btn" onclick="history.back()" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="2.5"><path d="M15 18 9 12l6-6"/></svg>
    </button>
    <div class="title">Report visible hazard</div>
  </div>

  <div class="safe-note">
    Photos are tagged for LGU responders only. MonsoonAI will not decide whether a building is safe or give structural advice from an image.
  </div>

  <form class="report-panel" id="reportForm">
    <div class="drop-zone">
      <input class="file-input" id="photoInput" name="photo" type="file" accept="image/*" capture="environment" required />
      <img class="preview-img" id="previewImg" alt="Selected hazard photo preview" />
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
        Tap to take or choose a photo
      </div>
    </div>
    <div class="panel-body">
      <textarea class="note-input" id="noteInput" name="note" maxlength="500" placeholder="Optional note for responders"></textarea>
      <button class="btn btn-primary btn-lg btn-full" id="submitBtn" type="submit">Send to LGU</button>
      <div class="result-box" id="resultBox"></div>
    </div>
  </form>

  <nav class="bottom-nav">
    <div class="nav-item" onclick="location.href='08-dashboard-calm.html'"><div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--ink-2)" stroke-width="2"><path d="M3 11 12 3l9 8"/><path d="M5 10v10h14V10"/></svg></div><span class="nav-label">Home</span></div>
    <div class="nav-item" onclick="location.href='12-map.html'"><div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--ink-2)" stroke-width="2"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2Z"/><path d="M9 4v14"/><path d="M15 6v14"/></svg></div><span class="nav-label">Map</span></div>
    <div class="nav-center"><div class="nav-center-btn" onclick="location.href='14-chatbot.html'"><img src="../assets/short_logo.png" alt="" width="42" height="42" style="object-fit:contain;"/></div><span class="nav-center-label">Chat now</span></div>
    <div class="nav-item" onclick="location.href='16-profile.html'"><div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--ink-2)" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg></div><span class="nav-label">Profile</span></div>
    <div class="nav-item active" onclick="location.href='17-more.html'"><div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--orange)" stroke-width="2"><circle cx="6" cy="6" r="1.5"/><circle cx="12" cy="6" r="1.5"/><circle cx="18" cy="6" r="1.5"/><circle cx="6" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/><circle cx="6" cy="18" r="1.5"/><circle cx="12" cy="18" r="1.5"/><circle cx="18" cy="18" r="1.5"/></svg></div><span class="nav-label">More</span></div>
  </nav>
</div>

<script>
const photoInput = document.getElementById('photoInput');
const previewImg = document.getElementById('previewImg');
const emptyState = document.getElementById('emptyState');
const resultBox = document.getElementById('resultBox');
const submitBtn = document.getElementById('submitBtn');

photoInput.addEventListener('change', () => {
  const file = photoInput.files && photoInput.files[0];
  if (!file) return;
  previewImg.src = URL.createObjectURL(file);
  previewImg.style.display = 'block';
  emptyState.style.display = 'none';
  resultBox.style.display = 'none';
});

document.getElementById('reportForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const token = localStorage.getItem('monsoon_token') || '';
  if (!token) {
    alert('Please sign in before sending a report.');
    return;
  }

  const form = new FormData();
  const file = photoInput.files && photoInput.files[0];
  if (!file) {
    alert('Choose or take a photo first.');
    return;
  }
  form.append('photo', file);
  form.append('note', document.getElementById('noteInput').value || '');

  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending...';
  try {
    const res = await fetch(API_BASE + '/api/reports/hazard-photo', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token },
      body: form,
    });
    const data = await res.json();
    if (!res.ok) throw data;
    const tags = (data.hazards || []).map(h => `<span class="hazard-tag">${h}</span>`).join('') || '<span class="hazard-tag">No listed hazard visible</span>';
    resultBox.innerHTML = `<strong>Report sent to LGU for human review.</strong><div class="tag-row">${tags}</div>`;
    resultBox.style.display = 'block';
  } catch (err) {
    alert((err && err.error) || 'Could not send report.');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Send to LGU';
  }
});
</script>
</body>
</html>
