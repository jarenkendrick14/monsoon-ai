<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonsoonAI — Ask Monsoon</title>
  <link rel="stylesheet" href="../_brand.css" />
  <script src="../js/_api.js"></script>
  <style>
    html, body { height: 100%; background: #fff; }
    .app-shell { max-width: 430px; min-height: 100vh; margin: 0 auto; background: #fff; display: flex; flex-direction: column; }
    @media (min-width: 768px) {
      body { background: var(--warm-bg); display: flex; align-items: center; justify-content: center; }
      .app-shell { min-height: unset; height: 780px; border-radius: 44px; box-shadow: 0 24px 80px rgba(0,0,0,.18); overflow: hidden; }
    }

    .messages { flex: 1; overflow-y: auto; padding: 14px 14px 8px; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
    .messages-inner { display: flex; flex-direction: column; gap: 12px; flex: 1; justify-content: flex-end; }

    .bubble-wrap { display: flex; gap: 8px; align-items: flex-end; max-width: 88%; }
    .bubble-wrap.user { align-self: flex-end; flex-direction: row-reverse; max-width: 78%; }
    .bubble-avatar { width: 26px; height: 26px; border-radius: 999px; flex-shrink: 0; border: 1.5px solid var(--orange); background: #fff; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
    .bubble { padding: 10px 14px; font-size: 13px; line-height: 1.5; border-radius: 4px 18px 18px 18px; background: #fff; border: 1px solid var(--hairline); color: var(--ink); }
    .bubble.user { border-radius: 18px 18px 4px 18px; background: var(--orange); color: #fff; border-color: var(--orange); }

    .evac-attach { width: 240px; border-radius: 16px; overflow: hidden; border: 1px solid var(--hairline); background: #fff; }
    .evac-attach-map { height: 80px; background: #e8f0fe; position: relative; overflow: hidden; }
    .evac-attach-map::before { content: ''; position: absolute; inset: 0; background: linear-gradient(rgba(30,91,217,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(30,91,217,.04) 1px, transparent 1px); background-size: 20px 20px; }
    .evac-attach-body { padding: 10px; }

    .cmd-pills { display: flex; gap: 8px; overflow-x: auto; padding: 4px 14px 0; scrollbar-width: none; }
    .cmd-pills::-webkit-scrollbar { display: none; }
    .cmd-pill { flex: 0 0 auto; padding: 8px 12px; border-radius: 999px; background: var(--orange); color: #fff; font-family: var(--font-ui); font-size: 11.5px; font-weight: 700; display: inline-flex; gap: 6px; align-items: center; cursor: pointer; transition: opacity .15s; }
    .cmd-pill:hover { opacity: .85; }

    .composer { padding: 10px 14px calc(14px + 74px); }
    .composer-bar { height: 50px; border-radius: 999px; background: var(--orange); color: #fff; display: flex; align-items: center; padding: 0 10px 0 18px; gap: 10px; cursor: pointer; }
    .composer-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-weight: 700; font-size: 14px; font-family: var(--font-ui); }
    .composer-input::placeholder { color: rgba(255,255,255,.7); }
    .composer-icon-btn { width: 32px; height: 32px; border-radius: 999px; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; flex-shrink: 0; }

    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 6px 0; }
    .typing-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--muted); animation: typingBounce .8s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes typingBounce { 0%,100%{ transform: translateY(0); } 50% { transform: translateY(-5px); } }
  </style>
</head>
<body>

<div class="app-shell">

  <div class="app-header">
    <div class="app-logo">
      <img src="../assets/short_logo.png" alt="" width="32" height="32" style="object-fit:contain;" />
      <span class="app-logo-name">MONSOON<span> AI</span></span>
    </div>
    <div class="flood-pill pill-ok" id="statusPill"><span class="dot"></span><span id="statusText">ALL CLEAR</span></div>
  </div>

  <div style="padding:8px 18px 4px;">
    <div style="font-family:var(--font-display);font-weight:800;font-size:26px;color:var(--orange);line-height:1.1;" id="chatGreeting">Hello,</div>
    <div style="font-size:12.5px;color:var(--ink-2);margin-top:4px;">I'm running the same engine that powers SMS. Ask me anything about your home's risk.</div>
  </div>

  <div class="messages" id="messagesArea">
    <div class="messages-inner" id="messagesList">
      <div id="typingIndicator" style="display:none;">
        <div class="bubble-wrap">
          <div class="bubble-avatar">
            <img src="../assets/short_logo.png" alt="" width="18" height="18" style="object-fit:contain;" />
          </div>
          <div class="bubble" style="padding:10px 14px;">
            <div class="typing-indicator">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="cmd-pills" id="cmdPills">
    <div class="cmd-pill" onclick="sendCommand('STATUS')">STATUS</div>
    <div class="cmd-pill" onclick="sendCommand('Weather update')">Weather update</div>
    <div class="cmd-pill" onclick="sendCommand('Will it rain?')">Will it rain?</div>
    <div class="cmd-pill" onclick="sendCommand('EVAC')">EVAC</div>
    <div class="cmd-pill" onclick="sendCommand('HAZE')">HAZE</div>
    <div class="cmd-pill" onclick="sendCommand('HELP')">HELP</div>
  </div>

  <div class="composer">
    <div class="composer-bar">
      <input id="chatInput" type="text" class="composer-input" placeholder="Ask Monsoon"
             onkeydown="if(event.key==='Enter') sendMessage()" />
      <button class="composer-icon-btn" type="button" onclick="startVoice()" title="Voice input">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M5 11a7 7 0 0 0 14 0M12 18v4"/></svg>
      </button>
      <button class="composer-icon-btn" type="button" onclick="sendMessage()" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9l20-7Z"/></svg>
      </button>
    </div>
    <div style="text-align:center;font-size:10.5px;color:var(--muted);margin-top:6px;">Powered by deterministic risk engine · LLM handles language only</div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item" onclick="location.href='08-dashboard-calm.html'"><div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--ink-2)" stroke-width="2" stroke-linecap="round"><path d="M3 11 12 3l9 8"/><path d="M5 10v10h14V10"/></svg></div><span class="nav-label">Home</span></div>
    <div class="nav-item" onclick="location.href='12-map.html'"><div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--ink-2)" stroke-width="2" stroke-linecap="round"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2Z"/><path d="M9 4v14"/><path d="M15 6v14"/></svg></div><span class="nav-label">Map</span></div>
    <div class="nav-center">
      <div class="nav-center-btn" style="background:var(--orange);border-color:var(--orange);" onclick="location.href='14-chatbot.html'">
        <img src="../assets/short_logo.png" alt="" width="42" height="42" style="object-fit:contain;" />
      </div>
      <span class="nav-center-label">Chat now</span>
    </div>
    <div class="nav-item" onclick="location.href='16-profile.html'"><div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--ink-2)" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg></div><span class="nav-label">Profile</span></div>
    <div class="nav-item" onclick="location.href='17-more.html'"><div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--ink-2)" stroke-width="2"><circle cx="6" cy="6" r="1.5"/><circle cx="12" cy="6" r="1.5"/><circle cx="18" cy="6" r="1.5"/><circle cx="6" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/><circle cx="6" cy="18" r="1.5"/><circle cx="12" cy="18" r="1.5"/><circle cx="18" cy="18" r="1.5"/></svg></div><span class="nav-label">More</span></div>
  </nav>

</div>

<script>
const _u = getUser();
const _rawName = _u?.name?.split(' ')[0] || _u?.firstName || 'there';
const _firstName = _rawName.charAt(0).toUpperCase() + _rawName.slice(1);
const chatDisasterScenario = getDisasterScenario();
document.getElementById('chatGreeting').textContent = `Hello ${_firstName},`;
if (chatDisasterScenario) {
  document.getElementById('statusPill').className = 'flood-pill pill-critical mm-blink';
  document.getElementById('statusText').textContent = 'FLOOD WARNING';
}

/* Stable session ID per user, persisted across page loads */
const _sessionKey = 'monsoon_chat_session_' + (_u?.id || 'guest');
let sessionId = localStorage.getItem(_sessionKey);
if (!sessionId) {
  sessionId = 'sess_' + Math.random().toString(36).slice(2, 10);
  localStorage.setItem(_sessionKey, sessionId);
}

/* Load history on open */
(async () => {
  try {
    const data = await apiFetch('/api/chat/history?sessionId=' + encodeURIComponent(sessionId));
	    (data.history || []).forEach(msg => {
	      appendBubble(msg.role === 'assistant' ? 'bot' : 'user',
	        msg.role === 'assistant' ? renderMarkdown(msg.content) : msg.content,
	        msg.role === 'assistant');
	    });
      if (chatDisasterScenario) appendDisasterContextBubble();
	  } catch {
      if (chatDisasterScenario) appendDisasterContextBubble();
    }
	})();

function escapeHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function appendBubble(who, content, isHtml = false) {
  const list = document.getElementById('messagesList');
  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap${who === 'user' ? ' user' : ''}`;
  if (who === 'user') {
    wrap.innerHTML = `<div class="bubble user">${escapeHtml(content)}</div>`;
  } else {
    wrap.innerHTML = `
      <div class="bubble-avatar"><img src="../assets/short_logo.png" alt="" width="18" height="18" style="object-fit:contain;"/></div>
      <div class="bubble">${isHtml ? content : escapeHtml(content)}</div>`;
  }
  list.insertBefore(wrap, document.getElementById('typingIndicator'));
	  document.getElementById('messagesArea').scrollTop = 99999;
	}

function appendDisasterContextBubble() {
  appendBubble(
    'bot',
    `Disaster Mode is active for your saved area: ${chatDisasterScenario.rainfall24h} mm/24h rainfall, ${chatDisasterScenario.riverLevel} NHWL river level, Signal #${chatDisasterScenario.signal}. First: who is with you right now?`,
  );
  document.getElementById('cmdPills').innerHTML = ['STATUS', 'EVAC', 'Show evac route', 'View checklist', 'Call 911']
    .map(cmd => `<div class="cmd-pill" onclick="sendCommand('${escapeHtml(cmd)}')">${escapeHtml(cmd)}</div>`)
    .join('');
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  appendBubble('user', text);
  await callChatAPI(text);
}

function sendCommand(cmd) {
  document.getElementById('chatInput').value = cmd;
  sendMessage();
}

async function callChatAPI(message) {
  const typing = document.getElementById('typingIndicator');
  typing.style.display = 'flex';
  document.getElementById('messagesArea').scrollTop = 99999;

  try {
    const data = await apiFetch('/api/chat/message', {
      method: 'POST',
      body: JSON.stringify({
        message,
        sessionId,
        locale: _u?.locale || 'en',
        disasterMode: getDisasterScenario() ? 'critical' : undefined,
      }),
    });
    typing.style.display = 'none';
    appendBubble('bot', renderMarkdown(data.reply), true);

    if (data.attachments?.length) {
      data.attachments.forEach(a => {
        if (a.type === 'evac_route') appendEvacCard(a);
      });
    }
    if (data.suggestedCommands?.length) {
      document.getElementById('cmdPills').innerHTML = data.suggestedCommands
        .map(cmd => `<div class="cmd-pill" onclick="sendCommand('${escapeHtml(cmd)}')">${escapeHtml(cmd)}</div>`)
        .join('');
    }
  } catch {
    typing.style.display = 'none';
    appendBubble('bot', 'Could not reach the server. Try texting STATUS to MonsoonAI.');
  }
}

function appendEvacCard(a) {
  const list = document.getElementById('messagesList');
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';
  wrap.innerHTML = `
    <div class="bubble-avatar" style="opacity:0;pointer-events:none;"><img src="../assets/short_logo.png" width="18" height="18" style="object-fit:contain;"/></div>
    <div class="bubble" style="padding:0;border:none;background:transparent;">
      <div class="evac-attach">
        <div class="evac-attach-map">
          <svg viewBox="0 0 240 80" style="position:absolute;inset:0;width:100%;height:100%;">
            <path d="M30 65 C 90 45, 130 35, 200 15" stroke="var(--orange)" stroke-width="3.5" fill="none" stroke-dasharray="2 5" stroke-linecap="round"/>
          </svg>
          <div style="position:absolute;bottom:22%;left:13%;width:12px;height:12px;border-radius:999px;background:var(--orange);border:2px solid #fff;"></div>
          <div style="position:absolute;top:15%;right:15%;width:20px;height:20px;border-radius:999px;background:var(--ok);border:2px solid #fff;display:flex;align-items:center;justify-content:center;">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="m4 12 5 5 11-12"/></svg>
          </div>
        </div>
        <div class="evac-attach-body">
          <div style="font-size:12px;font-weight:800;color:var(--ink);">${escapeHtml(a.centerName || 'Evac Center')}</div>
          <div style="font-size:11px;color:var(--ink-2);margin-top:2px;">${a.distKm ? a.distKm + ' km' : ''} ${a.etaMin ? '· ' + a.etaMin + ' min walk' : ''}</div>
          <div style="display:flex;gap:6px;margin-top:8px;">
            <button class="btn btn-primary btn-sm" onclick="location.href='11-evac-route.html'">Open route</button>
          </div>
        </div>
      </div>
    </div>`;
  list.insertBefore(wrap, document.getElementById('typingIndicator'));
  document.getElementById('messagesArea').scrollTop = 99999;
}

function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice input not supported. Try Chrome on Android.'); return; }
  const rec = new SR();
  rec.lang = 'fil-PH';
  rec.onresult = e => { document.getElementById('chatInput').value = e.results[0][0].transcript; sendMessage(); };
  rec.start();
}
</script>

</body>
</html>
