<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonsoonAI — Step 1: Basic Info</title>
  <link rel="stylesheet" href="../_brand.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../js/_api.js"></script>
  <style>
    html, body { height: 100%; background: #fff; }
    .app-shell {
      max-width: 430px; min-height: 100vh; margin: 0 auto;
      background: #fff; padding: 24px 28px 40px;
      display: flex; flex-direction: column; gap: 14px;
    }
    @media (min-width: 768px) {
      body { background: var(--warm-bg); display: flex; align-items: center; justify-content: center; }
      .app-shell { min-height: unset; height: 760px; border-radius: 44px; box-shadow: 0 24px 80px rgba(0,0,0,.18); overflow-y: auto; }
    }
    .page-title-row { text-align: center; }
    .page-title { font-family: var(--font-display); font-weight: 800; font-size: 40px; color: var(--orange); line-height: 1; }
    .page-sub { font-size: 12.5px; color: var(--ink-2); margin-top: 6px; }
    .form-stack { display: flex; flex-direction: column; gap: 12px; }
    .pin-helper { font-family: var(--font-ui); font-size: 10.5px; color: var(--orange); margin-top: 4px; }
    .map-preview {
      height: 180px; border-radius: 14px; border: 1.5px dashed var(--orange-soft);
      overflow: hidden; position: relative;
    }
    .action-row { margin-top: auto; padding-top: 14px; }
  </style>
</head>
<body>

<!-- ============================================================
     BACKEND NOTES:
     API: PATCH /api/user/profile  (auth required, Bearer token)
     Request body: {
       firstName: string,
       middleName: string,
       lastName: string,
       address: string,
       coordinates: { lat: number, lng: number },   ← from map pin
       phone: string
     }
     Response (200): { success: true, profile: {...} }

     Geocoding: POST /api/geocode { address: string }
       → returns { lat, lng, formattedAddress }
       Use to auto-fill coordinates when user types address.

     Map pin: Use Leaflet.js or Mapbox GL JS with a draggable marker.
       Map div id: "addressMap"
       On marker drag: update hidden inputs lat/lng

     Address autocomplete: Consider Google Places API or
       local barangay lookup → GET /api/geo/barangay-search?q=
     ============================================================ -->

<div class="app-shell">

  <!-- Step indicator -->
  <div class="steps">
    <div class="step-dot done">1</div>
    <div class="step-line"></div>
    <div class="step-dot">2</div>
    <div class="step-line"></div>
    <div class="step-dot">3</div>
  </div>

  <div class="page-title-row">
    <h1 class="page-title">Get started</h1>
    <p class="page-sub">Please fill up the basic information.</p>
  </div>

  <form class="form-stack" id="basicInfoForm" onsubmit="handleBasicInfo(event)">

    <div class="field-wrap">
      <div class="field-input-wrap">
        <input type="text" id="firstName" name="firstName" placeholder="First name"
               autocomplete="given-name" required />
      </div>
    </div>

    <div class="field-wrap">
      <div class="field-input-wrap">
        <input type="text" id="middleName" name="middleName" placeholder="Middle name (optional)"
               autocomplete="additional-name" />
      </div>
    </div>

    <div class="field-wrap">
      <div class="field-input-wrap">
        <input type="text" id="lastName" name="lastName" placeholder="Last name"
               autocomplete="family-name" required />
      </div>
    </div>

    <!-- Address with map pin -->
    <div class="field-wrap">
      <div class="field-input-wrap">
        <input type="text" id="address" name="address"
               placeholder="House no., street, barangay, city"
               autocomplete="street-address" required
               oninput="debounceGeocode(this.value)" />
        <!-- BACKEND: Tap icon → open map modal for pin dropping -->
        <button type="button" onclick="openMapPicker()" style="background:none;border:none;cursor:pointer;color:var(--orange);padding:0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s7-7.6 7-13a7 7 0 1 0-14 0c0 5.4 7 13 7 13Z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
        </button>
      </div>
      <p class="pin-helper">Tap the 📍 icon to pin your exact location on the map.</p>
    </div>

    <!-- Leaflet map -->
    <div class="map-preview" id="addressMap"></div>

    <!-- Hidden inputs for coordinates (set by map drag) -->
    <input type="hidden" id="hiddenLat" name="lat" value="15.1463" />
    <input type="hidden" id="hiddenLng" name="lng" value="120.5796" />

    <div class="field-wrap">
      <div class="field-input-wrap">
        <input type="tel" id="phone" name="phone" placeholder="Phone number (+63...)"
               autocomplete="tel" />
      </div>
    </div>

    <div class="action-row">
      <button type="submit" class="btn btn-primary btn-lg btn-full">Next</button>
    </div>

  </form>

</div>

<script>
const DEFAULT_LAT = 15.1463, DEFAULT_LNG = 120.5796;
let leafletMap, leafletMarker;

function initMap(lat, lng) {
  if (leafletMap) { leafletMap.setView([lat, lng], 15); leafletMarker.setLatLng([lat, lng]); return; }
  leafletMap = L.map('addressMap').setView([lat, lng], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(leafletMap);
  leafletMarker = L.marker([lat, lng], { draggable: true }).addTo(leafletMap);
  leafletMarker.on('dragend', () => {
    const pos = leafletMarker.getLatLng();
    document.getElementById('hiddenLat').value = pos.lat.toFixed(6);
    document.getElementById('hiddenLng').value = pos.lng.toFixed(6);
  });
}

let geocodeTimer;
function debounceGeocode(address) {
  clearTimeout(geocodeTimer);
  geocodeTimer = setTimeout(() => geocodeAddress(address), 600);
}

async function geocodeAddress(address) {
  if (address.length < 8) return;
  try {
    const data = await apiFetch('/api/geocode', { method: 'POST', body: JSON.stringify({ address }) });
    document.getElementById('hiddenLat').value = data.lat;
    document.getElementById('hiddenLng').value = data.lng;
    initMap(data.lat, data.lng);
  } catch { /* silently ignore geocode failure */ }
}

function openMapPicker() {
  // Map is already embedded; scroll into view so user can drag the pin
  document.getElementById('addressMap').scrollIntoView({ behavior: 'smooth' });
}

async function handleBasicInfo(e) {
  e.preventDefault();
  const form = e.target;
  const payload = {
    firstName:  form.firstName.value.trim(),
    middleName: form.middleName.value.trim(),
    lastName:   form.lastName.value.trim(),
    address:    form.address.value.trim(),
    coordinates: { lat: parseFloat(form.lat.value), lng: parseFloat(form.lng.value) },
    phone:      form.phone.value.trim(),
  };

  try {
    await apiFetch('/api/user/profile', { method: 'PATCH', body: JSON.stringify(payload) });
    location.href = '06-onboarding-household.html';
  } catch (err) {
    alert(err.error || err.message || 'Failed to save profile');
  }
}

initMap(DEFAULT_LAT, DEFAULT_LNG);
</script>

</body>
</html>
