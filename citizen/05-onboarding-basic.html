<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonsoonAI - Step 1: Basic Info</title>
  <link rel="stylesheet" href="../_brand.css" />
  <script src="../js/_api.js"></script>
  <style>
    html, body { height: 100%; background: #fff; }
    .app-shell { max-width: 430px; min-height: 100vh; margin: 0 auto; background: #fff; padding: 24px 28px 40px; display: flex; flex-direction: column; gap: 14px; }
    @media (min-width: 768px) {
      body { background: var(--warm-bg); display: flex; align-items: center; justify-content: center; }
      .app-shell { min-height: unset; height: 760px; border-radius: 44px; box-shadow: 0 24px 80px rgba(0,0,0,.18); overflow-y: auto; }
    }
    .page-title-row { text-align: center; }
    .page-title { font-family: var(--font-display); font-weight: 800; font-size: 40px; color: var(--orange); line-height: 1; }
    .page-sub { font-size: 12.5px; color: var(--ink-2); margin-top: 6px; }
    .form-stack { display: flex; flex-direction: column; gap: 12px; }
    .pin-helper { font-family: var(--font-ui); font-size: 10.5px; color: var(--orange); margin-top: 4px; }
    .map-preview { height: 180px; border-radius: 14px; border: 1.5px dashed var(--orange-soft); overflow: hidden; position: relative; background: #f7f3ed; }
    .action-row { margin-top: auto; padding-top: 14px; }
  </style>
</head>
<body>

<div class="app-shell">
  <div class="steps">
    <div class="step-dot done">1</div>
    <div class="step-line"></div>
    <div class="step-dot">2</div>
    <div class="step-line"></div>
    <div class="step-dot">3</div>
  </div>

  <div class="page-title-row">
    <h1 class="page-title">Get started</h1>
    <p class="page-sub">Please fill up the basic information.</p>
  </div>

  <form class="form-stack" id="basicInfoForm" onsubmit="handleBasicInfo(event)">
    <div class="field-wrap"><div class="field-input-wrap"><input type="text" id="firstName" name="firstName" placeholder="First name" autocomplete="given-name" required /></div></div>
    <div class="field-wrap"><div class="field-input-wrap"><input type="text" id="middleName" name="middleName" placeholder="Middle name (optional)" autocomplete="additional-name" /></div></div>
    <div class="field-wrap"><div class="field-input-wrap"><input type="text" id="lastName" name="lastName" placeholder="Last name" autocomplete="family-name" required /></div></div>

    <div class="field-wrap">
      <div class="field-input-wrap">
        <input type="text" id="address" name="address" placeholder="House no., street, barangay, city" autocomplete="street-address" required oninput="debounceGeocode(this.value)" />
        <button type="button" onclick="openMapPicker()" style="background:none;border:none;cursor:pointer;color:var(--orange);padding:0;" aria-label="Open map pin">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s7-7.6 7-13a7 7 0 1 0-14 0c0 5.4 7 13 7 13Z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
        </button>
      </div>
      <p class="pin-helper">Tap the pin icon, then drag the Google Maps marker to your exact location.</p>
    </div>

    <div class="map-preview" id="addressMap"></div>
    <input type="hidden" id="hiddenLat" name="lat" value="15.1463" />
    <input type="hidden" id="hiddenLng" name="lng" value="120.5796" />

    <div class="field-wrap"><div class="field-input-wrap"><input type="tel" id="phone" name="phone" placeholder="Phone number (+63...)" autocomplete="tel" /></div></div>
    <div class="action-row"><button type="submit" class="btn btn-primary btn-lg btn-full">Next</button></div>
  </form>
</div>

<script>
const DEFAULT_LAT = 15.1463;
const DEFAULT_LNG = 120.5796;
let googleMap;
let googleMarker;

function setCoordinates(lat, lng) {
  document.getElementById('hiddenLat').value = Number(lat).toFixed(6);
  document.getElementById('hiddenLng').value = Number(lng).toFixed(6);
}

async function initMap(lat, lng) {
  try {
    await loadGoogleMaps();
    const position = { lat: Number(lat), lng: Number(lng) };
    if (googleMap) {
      googleMap.setCenter(position);
      googleMarker.setPosition(position);
      setCoordinates(position.lat, position.lng);
      return;
    }

    googleMap = new google.maps.Map(document.getElementById('addressMap'), {
      center: position,
      zoom: 15,
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: false,
    });
    googleMarker = new google.maps.Marker({ position, map: googleMap, draggable: true, title: 'Your location' });
    googleMarker.addListener('dragend', () => {
      const pos = googleMarker.getPosition();
      if (pos) setCoordinates(pos.lat(), pos.lng());
    });
    setCoordinates(position.lat, position.lng);
  } catch {
    document.getElementById('addressMap').innerHTML = '<div style="padding:18px;font-size:12px;color:var(--ink-2);">Google Maps is not configured yet. Coordinates will use the default pin.</div>';
  }
}

let geocodeTimer;
function debounceGeocode(address) {
  clearTimeout(geocodeTimer);
  geocodeTimer = setTimeout(() => geocodeAddress(address), 600);
}

async function geocodeAddress(address) {
  if (address.length < 8) return;
  try {
    const data = await apiFetch('/api/geocode', { method: 'POST', body: JSON.stringify({ address }) });
    setCoordinates(data.lat, data.lng);
    initMap(data.lat, data.lng);
  } catch { /* keep current pin */ }
}

function openMapPicker() {
  document.getElementById('addressMap').scrollIntoView({ behavior: 'smooth' });
}

async function handleBasicInfo(e) {
  e.preventDefault();
  const form = e.target;
  const payload = {
    firstName: form.firstName.value.trim(),
    middleName: form.middleName.value.trim(),
    lastName: form.lastName.value.trim(),
    address: form.address.value.trim(),
    coordinates: { lat: parseFloat(form.lat.value), lng: parseFloat(form.lng.value) },
    phone: form.phone.value.trim(),
  };

  try {
    await apiFetch('/api/user/profile', { method: 'PATCH', body: JSON.stringify(payload) });
    location.href = '06-onboarding-household.html';
  } catch (err) {
    alert(err.error || err.message || 'Failed to save profile');
  }
}

initMap(DEFAULT_LAT, DEFAULT_LNG);
</script>
</body>
</html>
