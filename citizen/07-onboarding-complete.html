<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonsoonAI — You're All Set!</title>
  <link rel="stylesheet" href="../_brand.css" />
  <script src="../js/_api.js"></script>
  <style>
    html, body { height: 100%; background: #fff; }
    .app-shell {
      max-width: 430px; min-height: 100vh; margin: 0 auto;
      background: #fff; padding: 40px 28px;
      display: flex; flex-direction: column; gap: 18px;
    }
    @media (min-width: 768px) {
      body { background: var(--warm-bg); display: flex; align-items: center; justify-content: center; }
      .app-shell { min-height: unset; height: 760px; border-radius: 44px; box-shadow: 0 24px 80px rgba(0,0,0,.18); overflow-y: auto; }
    }
    .headline { text-align: center; margin-top: 40px; }
    .headline h1 { font-family: var(--font-display); font-weight: 800; font-size: 56px; color: var(--orange); line-height: 1; }
    .headline p { font-size: 13.5px; color: var(--ink-2); margin-top: 14px; max-width: 280px; margin-left: auto; margin-right: auto; line-height: 1.55; }
    .profile-card {
      padding: 16px; border-radius: 18px;
      background: var(--warm-bg); border: 1px solid var(--hairline);
      display: flex; flex-direction: column; gap: 10px;
    }
    .profile-card-header { display: flex; justify-content: space-between; align-items: center; }
    .profile-card-header .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; font-weight: 700; }
    .profile-card-header .edit-link { font-size: 12px; color: var(--orange); font-weight: 700; cursor: pointer; }
    .profile-name { font-size: 14px; color: var(--ink); font-weight: 600; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .risk-score-line { font-size: 11.5px; color: var(--ink-2); margin-top: 4px; }
    .risk-score-line strong { color: var(--critical); }
    @keyframes popIn { 0% { transform: scale(.7); opacity:0; } 80%{ transform: scale(1.05); } 100% { transform: scale(1); opacity:1; } }
    .headline h1 { animation: popIn .5s ease-out; }
  </style>
</head>
<body>

<div class="app-shell" id="shell">

  <div class="steps">
    <div class="step-dot done">1</div>
    <div class="step-line done"></div>
    <div class="step-dot done">2</div>
    <div class="step-line done"></div>
    <div class="step-dot done">3</div>
  </div>

  <div class="headline">
    <h1>You're all<br/>set.</h1>
    <p>Your home is now in our risk model. We'll text the moment thresholds cross — no spam, ever.</p>
  </div>

  <div class="profile-card" id="profileCard">
    <div class="profile-card-header">
      <span class="label">Your profile</span>
      <span class="edit-link" onclick="location.href='05-onboarding-basic.html'">Edit</span>
    </div>
    <div class="profile-name" id="profileName">—</div>
    <div class="chip-row" id="flagChips">
      <span class="chip selected" style="height:26px;font-size:11px;">Loading…</span>
    </div>
    <div class="risk-score-line">
      Initial risk score · <strong id="riskTierLabel">—</strong> · re-evaluated every 3 hours.
    </div>
  </div>

  <div style="padding:12px 14px;border-radius:14px;background:var(--orange-tint);border:1px solid var(--orange-soft);">
    <div style="font-size:11px;font-weight:800;color:var(--orange-deep);letter-spacing:.4px;text-transform:uppercase;">SMS alerts enabled</div>
    <p style="font-size:12.5px;color:var(--ink-2);margin-top:4px;" id="smsNotice">
      Alerts will be sent to your registered number. Text HELP to MonsoonAI anytime.
    </p>
  </div>

  <button class="btn btn-primary btn-lg btn-full" style="margin-top:14px;" onclick="location.href='08-dashboard-calm.html'">
    Open dashboard
  </button>

</div>

<script>
async function loadRiskSummary() {
  try {
    const data = await apiFetch('/api/user/risk-summary');

    document.getElementById('profileName').textContent =
      (data.user?.fullName || data.user?.name || 'You') + (data.user?.address ? ' · ' + data.user.address : '');

    if (data.user?.mobile) {
      document.getElementById('smsNotice').textContent =
        `Alerts will be sent to ${data.user.mobile}. Text HELP to MonsoonAI anytime.`;
    }

    const chipRow = document.getElementById('flagChips');
    chipRow.innerHTML = (data.vulnerabilityFlags || []).map(flag => {
      const cls = /nipa|structural/i.test(flag) ? 'chip-critical'
                : /floor|flood/i.test(flag) ? 'chip-warn'
                : /elderly|pwd|disability|infant|pregnant/i.test(flag) ? 'chip-blue'
                : '';
      return `<span class="chip ${cls} selected" style="height:26px;font-size:11px;">${flag}</span>`;
    }).join('') || '<span class="chip selected" style="height:26px;font-size:11px;">Standard household</span>';

    const tierEl = document.getElementById('riskTierLabel');
    tierEl.textContent = (data.riskTier || '').toUpperCase();
    tierEl.style.color = data.riskTier === 'critical' ? 'var(--critical)'
                       : data.riskTier === 'high' ? 'var(--warn)' : 'var(--ok)';

  } catch (err) {
    document.getElementById('profileName').textContent = '—';
    document.getElementById('flagChips').innerHTML = '';
  }
}

loadRiskSummary();
</script>

</body>
</html>
